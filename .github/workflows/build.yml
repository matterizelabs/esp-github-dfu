name: Build

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build firmware
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            espressif/idf:v6.0.2 \
            /bin/bash -c ". /opt/esp/idf/export.sh && idf.py set-target esp32c3 && idf.py build"

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: build/esp-gh-dfu.bin
          generate_release_notes: true
